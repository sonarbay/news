name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            name: sonarbay-linux-x64
          - goos: linux
            goarch: arm64
            name: sonarbay-linux-arm64
          - goos: darwin
            goarch: arm64
            name: sonarbay-darwin-arm64
          - goos: darwin
            goarch: amd64
            name: sonarbay-darwin-x64
          - goos: windows
            goarch: amd64
            name: sonarbay-win-x64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -ldflags="-s -w" -o ${{ matrix.name }} .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect binaries
        run: |
          mkdir -p release
          find artifacts -type f | while read f; do
            cp "$f" "release/$(basename "$f")"
          done
          chmod +x release/sonarbay-*
          ls -la release/

      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
